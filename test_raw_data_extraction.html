  <button onclick="extractReviews()">Extract Reviews</button>
  
  <h3>Extracted Reviews (what goes to main textarea):</h3>
  <pre id="output"></pre>
  
  <script>
    function handleRawDataExtract() {
      const rawData = document.getElementById('rawData').value;
      if (!rawData.trim()) {
        alert('Please enter raw data first.');
        return;
      }

      // Exact logic from Search.jsx
      let reviews = rawData.split('\n\n')
        .map(para => para.trim())
        .filter(para => para.length > 10)
        .map(para => para.length > 500 ? para.substring(0, 500) + '...' : para);

      if (reviews.length === 0) {
        reviews = rawData.split('\n')
          .map(line => line.trim())
          .filter(line => line.length > 10);
      }

      if (reviews.length === 0) {
        document.getElementById('output').innerText = 'No valid reviews found (min 10 chars).';
        return;
      }

      return reviews.join('\n\n');
    }

    function extractReviews() {
      const result = handleRawDataExtract();
      document.getElementById('output').innerText = result || 'Error occurred.';
    }
  </script>
